repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: python -m ruff check
        language: system
        types_or: [python, pyi]

      - id: mypy
        name: mypy focused contract check
        entry: python -m mypy
        language: system
        pass_filenames: false
        files: ^src/quant_pd_framework/

      - id: module-size-ratchet
        name: module size ratchet
        entry: python scripts/check_module_size.py
        language: system
        pass_filenames: false

      - id: detect-secrets
        name: detect-secrets
        entry: detect-secrets-hook --baseline .secrets.baseline
        language: system
        types: [text]
        exclude: >-
          (?x)^(
            \.secrets\.baseline|
            .*\.csv|
            .*\.docx|
            .*\.html|
            .*\.joblib|
            .*\.parquet|
            .*\.pdf|
            .*\.png|
            .*\.xlsx|
            .*\.zip
          )$
