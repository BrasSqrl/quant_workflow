name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Run Ruff
        run: python -m ruff check app src tests examples

      - name: Run golden reference workflows
        run: python -m pytest -q tests/test_reference_workflows.py

      - name: Run full test suite
        run: python -m pytest -q
